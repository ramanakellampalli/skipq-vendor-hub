name: PR CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: TypeScript check & Android build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Create CI env file
        run: |
          echo "API_URL=http://localhost:8080" > .env
          echo "ABLY_API_KEY=ci_placeholder" >> .env

      - name: Decode keystore
        run: echo "${{ secrets.SKIPQ_VENDOR_KEYSTORE }}" | base64 --decode > android/app/skipq-vendor-release.keystore

      - name: Write gradle.properties
        run: |
          cat >> android/gradle.properties << EOF
          SKIPQ_VENDOR_STORE_FILE=skipq-vendor-release.keystore
          SKIPQ_VENDOR_KEY_ALIAS=${{ secrets.SKIPQ_VENDOR_KEY_ALIAS }}
          SKIPQ_VENDOR_STORE_PASSWORD=${{ secrets.SKIPQ_VENDOR_STORE_PASSWORD }}
          SKIPQ_VENDOR_KEY_PASSWORD=${{ secrets.SKIPQ_VENDOR_KEY_PASSWORD }}
          EOF

      - name: Build Android release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
