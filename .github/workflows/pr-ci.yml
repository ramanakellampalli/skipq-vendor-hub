name: PR CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: TypeScript check & Android build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Create CI env file
        run: |
          echo "API_URL=http://localhost:8080" > .env
          echo "ABLY_API_KEY=ci_placeholder" >> .env

      - name: Build Android debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
