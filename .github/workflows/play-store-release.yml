name: Play Store Release

on:
  workflow_dispatch:

jobs:
  release:
    name: Build & Upload to Closed Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          echo "API_URL=${{ secrets.API_URL }}" >> .env
          echo "ABLY_API_KEY=${{ secrets.ABLY_API_KEY }}" >> .env

      - name: Configure gradle.properties
        run: echo "hermesEnabled=true" >> android/gradle.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/skipq-vendor-release.keystore

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -PSKIPQ_VENDOR_STORE_FILE=skipq-vendor-release.keystore \
            -PSKIPQ_VENDOR_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }} \
            -PSKIPQ_VENDOR_KEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PSKIPQ_VENDOR_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store (Closed Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.skipqvendorhub
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: alpha
